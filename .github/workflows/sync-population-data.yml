name: Sync Population Data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: write

concurrency:
  group: sync-population-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync monthly population summary
        run: npm run sync:population

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data; then
            echo "No population data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): sync population summary"
          git push
